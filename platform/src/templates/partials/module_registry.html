<div id="module-registry">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-white">Module Registry</h2>
        <button hx-get="/registry/create" hx-target="#registry-form" hx-swap="innerHTML"
                class="px-3 py-1.5 bg-accent text-accent-t font-medium rounded text-sm hover:bg-accent-h">
            + New Module
        </button>
    </div>
    <div id="registry-form"></div>
    {% if modules %}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {% for mod in modules %}
        <div class="border border-border rounded-lg p-4 bg-bg-raised">
            <div class="font-medium text-text">{{ mod }}</div>
            <div class="mt-3 flex gap-3">
                <button hx-get="/registry/{{ mod }}/edit" hx-target="#registry-form" hx-swap="innerHTML"
                        class="text-sm text-accent hover:underline">Edit</button>
                <button hx-post="/registry/{{ mod }}/delete" hx-target="#module-registry" hx-swap="outerHTML"
                        hx-confirm="Delete module '{{ mod }}'?"
                        class="text-sm text-danger hover:underline">Delete</button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-sm text-text-muted">No modules found in the source repository.</p>
    {% endif %}
</div>
