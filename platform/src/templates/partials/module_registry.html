<div id="module-registry">
    <div class="flex justify-between items-center mb-4">
        <span class="text-xs text-text-muted">{{ modules|length }} module{{ 's' if modules|length != 1 }}</span>
        <button hx-get="/registry/create" hx-target="#registry-form" hx-swap="innerHTML"
                class="px-3 py-1.5 bg-accent text-accent-t font-medium rounded-lg text-xs hover:bg-accent-h transition-colors">
            + New Module
        </button>
    </div>
    <div id="registry-form"></div>
    {% if modules %}
    <div class="space-y-2">
        {% for mod in modules %}
        <div class="border border-border rounded-lg p-3 bg-bg hover:border-border-l transition-colors">
            <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-text">{{ mod }}</span>
                <div class="flex gap-3">
                    <button hx-get="/registry/{{ mod }}/edit" hx-target="#registry-form" hx-swap="innerHTML"
                            class="text-xs text-accent hover:text-accent-h transition-colors">Edit</button>
                    <button hx-post="/registry/{{ mod }}/delete" hx-target="#module-registry" hx-swap="outerHTML"
                            hx-confirm="Delete module '{{ mod }}'?"
                            class="text-xs text-danger hover:text-danger/80 transition-colors">Delete</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-sm text-text-muted text-center py-8">No modules found in the source repository.</p>
    {% endif %}
</div>
