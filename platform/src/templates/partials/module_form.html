{% if mode == 'create' %}
<form hx-post="/registry/create" hx-target="#module-registry" hx-swap="outerHTML"
      class="mb-4 border border-border rounded-lg p-4 bg-bg-raised">
    <div class="mb-3">
        <label class="block text-sm font-medium mb-1 text-text">Module name</label>
        <input type="text" name="name" required
               placeholder="e.g. stripe, linear, supabase"
               class="w-full border border-border rounded px-3 py-1.5 text-sm bg-bg-input text-text placeholder-text-muted focus:border-accent focus:ring-1 focus:ring-accent outline-none">
    </div>
    <div class="mb-3">
        <label class="block text-sm font-medium mb-1 text-text">info.md</label>
        <textarea name="content" rows="10"
                  class="w-full border border-border rounded px-3 py-1.5 text-sm font-mono bg-bg-input text-text focus:border-accent focus:ring-1 focus:ring-accent outline-none">## Module Name

Description of what this module provides.
</textarea>
    </div>
    <div class="mb-3">
        <label class="block text-sm font-medium mb-1 text-text">Secrets (one variable per line, leave empty if none)</label>
        <textarea name="secrets" rows="4" placeholder="API_KEY_NAME"
                  class="w-full border border-border rounded px-3 py-1.5 text-sm font-mono bg-bg-input text-text placeholder-text-muted focus:border-accent focus:ring-1 focus:ring-accent outline-none"></textarea>
        <p class="mt-1 text-xs text-text-sec">
            These become the <code class="text-accent">.env.schema</code>. After creating, add the actual values in
            Infisical at path <code class="text-accent">/{module_name}</code>.
        </p>
    </div>
    <div class="flex gap-2">
        <button type="submit"
                class="px-3 py-1.5 bg-accent text-accent-t font-medium rounded text-sm hover:bg-accent-h">
            Create
        </button>
        <button type="button" onclick="this.closest('form').remove()"
                class="px-3 py-1.5 bg-bg border border-border text-text-sec rounded text-sm hover:text-text">
            Cancel
        </button>
    </div>
</form>
{% else %}
<form hx-post="/registry/{{ name }}/edit" hx-target="#module-registry" hx-swap="outerHTML"
      class="mb-4 border border-border rounded-lg p-4 bg-bg-raised">
    <input type="hidden" name="sha" value="{{ sha }}">
    <input type="hidden" name="schema_sha" value="{{ schema_sha }}">
    <div class="mb-3">
        <label class="block text-sm font-medium mb-1 text-text">Editing: {{ name }}/info.md</label>
        <textarea name="content" rows="14"
                  class="w-full border border-border rounded px-3 py-1.5 text-sm font-mono bg-bg-input text-text focus:border-accent focus:ring-1 focus:ring-accent outline-none">{{ content }}</textarea>
    </div>
    <div class="mb-3">
        <label class="block text-sm font-medium mb-1 text-text">Secrets (one variable per line)</label>
        <textarea name="secrets" rows="4"
                  class="w-full border border-border rounded px-3 py-1.5 text-sm font-mono bg-bg-input text-text focus:border-accent focus:ring-1 focus:ring-accent outline-none">{{ secrets }}</textarea>
        <p class="mt-1 text-xs text-text-sec">
            Add values in Infisical at path <code class="text-accent">/{{ name }}</code>.
        </p>
    </div>
    <div class="flex gap-2">
        <button type="submit"
                class="px-3 py-1.5 bg-accent text-accent-t font-medium rounded text-sm hover:bg-accent-h">
            Save
        </button>
        <button type="button" onclick="this.closest('form').remove()"
                class="px-3 py-1.5 bg-bg border border-border text-text-sec rounded text-sm hover:text-text">
            Cancel
        </button>
    </div>
</form>
{% endif %}
