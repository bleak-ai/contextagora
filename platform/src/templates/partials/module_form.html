{% if mode == 'create' %}
<form hx-post="/registry/create" hx-target="#module-registry" hx-swap="outerHTML"
      class="mb-4 border border-border rounded-lg p-4 bg-bg">
    <div class="mb-3">
        <label class="block text-xs font-medium mb-1.5 text-text-sec">Module name</label>
        <input type="text" name="name" required
               placeholder="e.g. stripe, linear, supabase"
               class="w-full border border-border rounded-lg px-3 py-2 text-sm bg-bg-input text-text placeholder-text-muted focus:border-accent/40 outline-none transition-colors">
    </div>
    <div class="mb-3">
        <label class="block text-xs font-medium mb-1.5 text-text-sec">info.md</label>
        <textarea name="content" rows="8"
                  class="w-full border border-border rounded-lg px-3 py-2 text-sm font-mono bg-bg-input text-text focus:border-accent/40 outline-none transition-colors">## Module Name

Description of what this module provides.
</textarea>
    </div>
    <div class="mb-4">
        <label class="block text-xs font-medium mb-1.5 text-text-sec">Secrets <span class="text-text-muted font-normal">(one per line, leave empty if none)</span></label>
        <textarea name="secrets" rows="3" placeholder="API_KEY_NAME"
                  class="w-full border border-border rounded-lg px-3 py-2 text-sm font-mono bg-bg-input text-text placeholder-text-muted focus:border-accent/40 outline-none transition-colors"></textarea>
        <p class="mt-1.5 text-[11px] text-text-muted">
            Becomes <code class="text-accent">.env.schema</code>. Add values in Infisical at <code class="text-accent">/{name}</code>.
        </p>
    </div>
    <div class="flex gap-2">
        <button type="submit"
                class="px-4 py-2 bg-accent text-accent-t font-medium rounded-lg text-xs hover:bg-accent-h transition-colors">
            Create
        </button>
        <button type="button" onclick="this.closest('form').remove()"
                class="px-4 py-2 bg-bg border border-border text-text-sec rounded-lg text-xs hover:text-text transition-colors">
            Cancel
        </button>
    </div>
</form>
{% else %}
<form hx-post="/registry/{{ name }}/edit" hx-target="#module-registry" hx-swap="outerHTML"
      class="mb-4 border border-border rounded-lg p-4 bg-bg">
    <input type="hidden" name="sha" value="{{ sha }}">
    <input type="hidden" name="schema_sha" value="{{ schema_sha }}">
    <div class="mb-3">
        <label class="block text-xs font-medium mb-1.5 text-text-sec">Editing: <span class="text-accent">{{ name }}/info.md</span></label>
        <textarea name="content" rows="10"
                  class="w-full border border-border rounded-lg px-3 py-2 text-sm font-mono bg-bg-input text-text focus:border-accent/40 outline-none transition-colors">{{ content }}</textarea>
    </div>
    <div class="mb-4">
        <label class="block text-xs font-medium mb-1.5 text-text-sec">Secrets <span class="text-text-muted font-normal">(one per line)</span></label>
        <textarea name="secrets" rows="3"
                  class="w-full border border-border rounded-lg px-3 py-2 text-sm font-mono bg-bg-input text-text focus:border-accent/40 outline-none transition-colors">{{ secrets }}</textarea>
        <p class="mt-1.5 text-[11px] text-text-muted">
            Add values in Infisical at <code class="text-accent">/{{ name }}</code>.
        </p>
    </div>
    <div class="flex gap-2">
        <button type="submit"
                class="px-4 py-2 bg-accent text-accent-t font-medium rounded-lg text-xs hover:bg-accent-h transition-colors">
            Save
        </button>
        <button type="button" onclick="this.closest('form').remove()"
                class="px-4 py-2 bg-bg border border-border text-text-sec rounded-lg text-xs hover:text-text transition-colors">
            Cancel
        </button>
    </div>
</form>
{% endif %}
