<!DOCTYPE html>
<html>
<head>
    <title>Context Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Context Loader</h1>

        <!-- Tabs -->
        <div class="flex gap-1 mb-6 border-b">
            <button onclick="showTab('picker')" id="tab-picker"
                    class="px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600">
                Load Modules
            </button>
            <button onclick="showTab('registry')" id="tab-registry"
                    class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                Manage Modules
            </button>
        </div>

        <!-- Picker Tab -->
        <div id="picker-content">
            {% include 'partials/module_picker.html' %}
        </div>

        <!-- Registry Tab -->
        <div id="registry-content" class="hidden"
             hx-get="/registry" hx-trigger="load" hx-swap="innerHTML">
            <p class="text-sm text-gray-500">Loading modules...</p>
        </div>
    </div>

    <script>
    function showTab(tab) {
        document.getElementById('picker-content').classList.toggle('hidden', tab !== 'picker');
        document.getElementById('registry-content').classList.toggle('hidden', tab !== 'registry');
        document.getElementById('tab-picker').className = tab === 'picker'
            ? 'px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600'
            : 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700';
        document.getElementById('tab-registry').className = tab === 'registry'
            ? 'px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600'
            : 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700';
    }
    </script>
</body>
</html>
