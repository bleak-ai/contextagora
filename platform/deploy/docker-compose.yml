services:
  context-loader:
    build:
      context: ../..
      dockerfile: platform/deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Platform secrets (passed directly, not via Infisical)
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=glm-5.1
      - ANTHROPIC_DEFAULT_SONNET_MODEL=glm-5.1
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=glm-5.1-flash
      # Infisical bootstrap credentials (for module secret resolution)
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT:-dev}
      - INFISICAL_SITE_URL=${INFISICAL_SITE_URL:-https://app.infisical.com}
    volumes:
      - ../../fixtures:/app/fixtures
